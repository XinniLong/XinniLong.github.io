- title: Research Experience
  type: time_table
  contents:
    - title: "Ph.D Project — Digital literacy in higher education: Comparing the UK and China"
      institution: University of Liverpool
      year: Oct 2020-Dec 2025
      description:
        - Designed and led cross-cultural research project across 36 UK and Chinese universities, managing complex stakeholder relationships and dual regulatory approval processes.
        - Conducted large-scale quantitative analysis (n = 1,100) using GLM, MANOVA, chi-square, and factor analysis in SPSS and R.
        - Produced an evidence-based analytical framework linking institutional habitus to differential digital competency outcomes, with direct implications for UK higher education policy on digital inclusion and AI integration.
        - Conducted 8 semi-structured interviews with educators and 10 focus groups with university students (60+ participants), generating rich qualitative data on technology adoption barriers.
        - Invited to contribute to the UK Government Essential Digital Skills Framework Review Advisory Panel (March 2022), convened by Lloyds Bank on behalf of UKGOV.
    - title: "Research Assistant — Towards Digital Inclusivity in the Humanities"
      institution: University of Liverpool
      year: Feb 2024-Sep 2024
      description:
        - Designed Qualtrics surveys and analyzed quantitative data to identify barriers to digital inclusion in academic research and teaching.
        - Created training materials for digital social science research methods based on empirical findings.

