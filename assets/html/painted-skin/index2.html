<!doctype html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>baguetteBox.js | Demo</title>
        <link rel="stylesheet" href="assets/css/baguetteBox.css">
        <style>
                body {
                        background-color: #666;
                        color: #ddd;
                        font-family: sans-serif;
                        margin: 0;
                }
                a, a:visited {
                        color: #97B6D6;
                        text-decoration: none;
                }
                h1, h2, h3, footer, .gallery {
                        text-align: center;
                }
                pre {
                        width: 300px;
                        margin: 0 auto;
                        border: dashed 1px #aaa;
                        padding: 12px;
                        margin-bottom: 10px;
                }
                header, footer {
                        padding: .2em 0;
                        background: #555;
                        box-shadow: 0 0 8px #222;
                }
                footer {
                        margin-top: 1em;
                }
                .content {
                        max-width: 1160px;
                        margin: 0 auto;
                }
                .gallery img {
                        height: 200px;
                        transition: -webkit-filter .4s, filter .4s;
                        filter: grayscale(0%);
                        -webkit-filter: grayscale(0%);
                }
                .gallery img:hover {
                        filter: grayscale(100%);
                        -webkit-filter: grayscale(100%);
                }
                .gallery a {
                        width: 250px;
                        height: 200px;
                        display: inline-block;
                        overflow: hidden;
                        margin: 4px;
                        box-shadow: 0 0 4px -1px #000;
                }
        </style>
</head>
<body>
<div class="content">
        <h2>gallery2</h2>
        <div class="baguetteBoxOne gallery">
                <a href="img/1-1.jpg" data-caption="Golden Gate Bridge"><img src="img/thumbs/1-1.jpg"></a>
                <a href="img/1-2.jpg" title="Midnight City"><img src="img/thumbs/1-2.jpg"></a>
                <a href="img/1-3.jpg"><img src="img/thumbs/1-3.jpg"></a>
                <a href="img/1-4.jpg"><img src="img/thumbs/1-4.jpg"></a>
                <a href="img/1-5.jpg"><img src="img/thumbs/1-5.jpg"></a>
                <a href="img/1-6.jpg"><img src="img/thumbs/1-6.jpg"></a>
                <a href="img/1-7.jpg"><img src="img/thumbs/1-7.jpg"></a>
                <a href="img/1-8.jpg"><img src="img/thumbs/1-8.jpg"></a>
        </div>
</div>
<script src="assets/js/baguetteBox.js"></script>
<script>
        window.onload = function () {
                baguetteBox.run('.baguetteBoxOne');
                baguetteBox.run('.baguetteBoxTwo');
                baguetteBox.run('.baguetteBoxThree', {
                        animation: 'fadeIn',
                });
                baguetteBox.run('.baguetteBoxFour', {
                        buttons: false
                });
                baguetteBox.run('.baguetteBoxFive');
        };
</script>
</body>
</html>
